<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualización Loader Malva</title>
    <style>
        /* Estilos base para la página de prueba */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .test-content {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            padding: 10px 20px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* --------------------------------------------------- */
        /* CÓDIGO DEL LOADER (El mismo que va en Shopify)      */
        /* --------------------------------------------------- */
        .luxury-loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .luxury-loader-overlay.loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        .luxury-loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .luxury-loader-svg-custom {
            width: 121px;
            height: auto;
            animation: luxury-float 4s ease-in-out infinite;
        }

        .luxury-custom-path {
            fill: transparent;
            stroke: currentColor;
            stroke-width: 0.5;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: luxury-draw-fill 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Retrasos en la animación para cada trazo (Efecto cascada) */
        .luxury-custom-path:nth-child(1) { animation-delay: 0.00s; }
        .luxury-custom-path:nth-child(2) { animation-delay: 0.05s; }
        .luxury-custom-path:nth-child(3) { animation-delay: 0.10s; }
        .luxury-custom-path:nth-child(4) { animation-delay: 0.15s; }
        .luxury-custom-path:nth-child(5) { animation-delay: 0.20s; }
        .luxury-custom-path:nth-child(6) { animation-delay: 0.25s; }
        .luxury-custom-path:nth-child(7) { animation-delay: 0.30s; }
        .luxury-custom-path:nth-child(8) { animation-delay: 0.35s; }
        .luxury-custom-path:nth-child(9) { animation-delay: 0.40s; }
        .luxury-custom-path:nth-child(10) { animation-delay: 0.45s; }
        .luxury-custom-path:nth-child(11) { animation-delay: 0.50s; }
        .luxury-custom-path:nth-child(12) { animation-delay: 0.55s; }
        .luxury-custom-path:nth-child(13) { animation-delay: 0.60s; }
        .luxury-custom-path:nth-child(14) { animation-delay: 0.65s; }
        .luxury-custom-path:nth-child(15) { animation-delay: 0.70s; }
        .luxury-custom-path:nth-child(16) { animation-delay: 0.75s; }
        .luxury-custom-path:nth-child(17) { animation-delay: 0.80s; }
        .luxury-custom-path:nth-child(18) { animation-delay: 0.85s; }
        .luxury-custom-path:nth-child(19) { animation-delay: 0.90s; }
        .luxury-custom-path:nth-child(20) { animation-delay: 0.95s; }
        .luxury-custom-path:nth-child(21) { animation-delay: 1.00s; }
        .luxury-custom-path:nth-child(22) { animation-delay: 1.05s; }
        .luxury-custom-path:nth-child(23) { animation-delay: 1.10s; }
        .luxury-custom-path:nth-child(24) { animation-delay: 1.15s; }
        .luxury-custom-path:nth-child(25) { animation-delay: 1.20s; }
        .luxury-custom-path:nth-child(26) { animation-delay: 1.25s; }
        .luxury-custom-path:nth-child(27) { animation-delay: 1.30s; }
        .luxury-custom-path:nth-child(28) { animation-delay: 1.35s; }
        .luxury-custom-path:nth-child(29) { animation-delay: 1.40s; }
        .luxury-custom-path:nth-child(30) { animation-delay: 1.45s; }

        @keyframes luxury-draw-fill {
            0% { stroke-dashoffset: 100; fill: transparent; }
            30% { stroke-dashoffset: 0; fill: transparent; }
            50%, 80% { stroke-dashoffset: 0; fill: currentColor; }
            100% { stroke-dashoffset: 100; fill: transparent; }
        }

        @keyframes luxury-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>

    <script>
        // Script para ocultar el loader a los 3 segundos (simulando carga)
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(function() {
                document.getElementById("luxury-global-loader").classList.add("loader-hidden");
            }, 3500);
        });

        // Función para el botón de prueba
        function mostrarLoader() {
            var loader = document.getElementById("luxury-global-loader");
            loader.classList.remove("loader-hidden");
            
            // Ocultarlo de nuevo después de 3.5 segundos
            setTimeout(function() {
                loader.classList.add("loader-hidden");
            }, 3500);
        }
    </script>
